services:
  env-setup:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: ["node", "scripts/setup-dev-env.mjs"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sorenwinslow}
      POSTGRES_USER: ${POSTGRES_USER:-soren}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soren} -d ${POSTGRES_DB:-sorenwinslow}"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-localredis}
  backend:
    build: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-soren}:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/${POSTGRES_DB:-sorenwinslow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-localredis}@redis:6379
    ports:
      - "4000:4000"
    depends_on:
      env-setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  admin-seed:
    build: ./backend
    command: npm run create-superadmin
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-soren}:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/${POSTGRES_DB:-sorenwinslow}
      ADMIN_EMAIL: ${LOCAL_SUPERADMIN_EMAIL:-admin@sorenwinslow.local}
      ADMIN_PASSWORD: ${LOCAL_SUPERADMIN_PASSWORD:-MySecretPassword123!}
    depends_on:
      env-setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      env-setup:
        condition: service_completed_successfully
      backend:
        condition: service_started
volumes:
  postgres-data:
